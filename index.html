<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Web</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #151522;
      --neon-cyan: #00ffff;
      --neon-purple: #9d00ff;
      --neon-green: #00ff88;
      --text-primary: #ffffff;
      --text-secondary: #c0c0c0;
      --border-color: rgba(0, 255, 255, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "Space Grotesk", sans-serif;
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    /* Navbar */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 10, 15, 0.9);
      border-bottom: 1px solid var(--border-color);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
    }
    nav .logo {
      font-size: 1.5rem;
      color: var(--neon-cyan);
      font-weight: 700;
      text-shadow: 0 0 8px var(--neon-cyan);
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }
    nav li { text-transform: uppercase; font-size: 0.9rem; }
    nav li:hover { color: var(--neon-green); }
    @media (max-width: 768px) {
      nav ul { display: none; }
    }

    /* Section common */
    section {
      padding: 5rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1, h2 {
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    h1 { font-size: 3rem; }
    h2 { font-size: 2rem; }

    /* Hero */
    .hero {
      text-align: center;
      margin-top: 6rem;
      background: radial-gradient(circle at 50% 0%, #2d004d 0%, #0a0a0f 70%);
    }
    .hero p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: var(--text-secondary);
    }
    .cta-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.8rem 1.5rem;
      border: 1px solid var(--neon-cyan);
      border-radius: 2rem;
      background: rgba(0, 255, 255, 0.1);
      color: var(--neon-cyan);
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 12px var(--neon-cyan);
    }
    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1.2rem;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      border-radius: 2rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 var(--neon-cyan); }
      80% { box-shadow: 0 0 0 6px rgba(0, 255, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
    }
