<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #212121; // Black
    }
    
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 65px; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #333; // Dark gray
    }
    
    .navbar a {
      color: white;
      text-decoration: none;
    }
    
    .content {
      padding-top: 65px;
      max-width: 1200px;
      margin: auto;
    }
    
    footer {
      background-color: #333; // Dark gray
      position: fixed;
      left: 0;
      width: 100%;
      bottom: 0;
      text-align: center;
      padding: 15px 20px;
    }
  
    .header-image {
      display: block;
      margin-bottom: 30px;
    }
    
    img {
      max-width: 140px; // Adjust the width as needed
    }
    
    h2, p {
      color: #888; // Light gray
    }
    
    @media only screen and (max-width: 768px) {
      .navbar {
        flex-direction: column;
      }
      
      .navbar a {
        font-size: 14px;
      }
      
      footer {
        padding-bottom: 20px; // Adjust the height as needed
      }
    }
  </style>
</head>
<body>
  
  <div class="header">
    <img src="https://via.placeholder.com/300x200.png" alt="Header Image">
    <h1>My Portfolio</h1>
  </div>

  <nav class="navbar">
    <a href="#">About</a>
    <a href="/#work">Work</a>
    <a href="/#contact">Contact</a>
  </nav>

  <section class="content">
    <!-- Add your portfolio content here -->
    
    <!-- Portfolio item 1 -->
    <div class="header-image">
      <img src="https://via.placeholder.com/200x300.png" alt="Portfolio Item ..
        " width="140"
        height="50"
        style="object-fit: cover;"/>
    </div>
    
    <h2>My Work</h2>
    <!-- Add your portfolio item details here -->
    
    <!-- Portfolio item 1 -->
    <div class="header-image">
      <img src="https://via.placeholder.com/200x300.png" alt="Portfolio Item 2.." width="140"
        height="50"
        style="object-fit: cover;"/>
    </div>
    
    <!-- Add more portfolio items as needed -->
  </section>

  <footer>
    Copyright © 2021 My Portfolio
  </footer>
  
</body>
</html>
